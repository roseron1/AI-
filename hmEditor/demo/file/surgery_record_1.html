<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>术前小结</title>
</head>
<body data-hm-papersize="A4_portrait$top:5mm#right:5mm#bottom:5mm#left:5mm" meta_json="" style="font-family: SimSun, 'Songti SC', serif; font-size: 16px; line-height: 1.8;">
<div class="emr-content-block" style="font-family: SimSun, 'Songti SC', serif; font-size: 16px; line-height: 1.8; color: #000;">
  <h2 style="text-align: center; font-size: 24px; font-weight: bold; margin-bottom: 20px; letter-spacing: 4px;">术前小结及术前讨论结论记录</h2>

  <table style="width: 100%; border: none; margin-bottom: 15px; font-size: 15px; line-height: 1.8; border-bottom: 2px solid #000; padding-bottom: 10px;">
    <tr>
      <td style="width: 15%; text-align: right; border: none; padding-right: 5px;">姓&nbsp;&nbsp;&nbsp;&nbsp;名：</td>
      <td style="width: 35%; border: none;"><span class="new-textbox" data-hm-name="姓名"><span class="new-textbox-content" contenteditable="true"></span></span></td>
      <td style="width: 15%; text-align: right; border: none; padding-right: 5px;">科&nbsp;&nbsp;&nbsp;&nbsp;室：</td>
      <td style="width: 35%; border: none;"><span class="new-textbox" data-hm-name="科室名称"><span class="new-textbox-content" contenteditable="true"></span></span></td>
    </tr>
    <tr>
      <td style="text-align: right; border: none; padding-right: 5px;">床位号：</td>
      <td style="border: none;"><span class="new-textbox" data-hm-name="床位号"><span class="new-textbox-content" contenteditable="true"></span></span></td>
      <td style="text-align: right; border: none; padding-right: 5px;">住院号：</td>
      <td style="border: none;"><span class="new-textbox" data-hm-name="住院号"><span class="new-textbox-content" contenteditable="true"></span></span></td>
    </tr>
    <tr>
      <td style="text-align: right; border: none; padding-right: 5px; padding-bottom: 10px;">记录时间：</td>
      <td style="border: none; padding-bottom: 10px;"><span class="new-textbox" data-hm-name="记录时间"><span class="new-textbox-content" contenteditable="true">YYYY-MM-DD HH:MM</span></span></td>
      <td style="text-align: right; border: none; padding-right: 5px; padding-bottom: 10px;">责任医师：</td>
      <td style="border: none; padding-bottom: 10px;"><span class="new-textbox" data-hm-name="责任医师"><span class="new-textbox-content" contenteditable="true"></span></span></td>
    </tr>
  </table>

  <p style="margin: 10px 0 10px 0; font-weight: bold;">简要病情：</p>
  <div class="new-textbox" data-hm-name="简要病情" style="text-indent: 2em; margin-bottom: 10px;">
    <div class="new-textbox-content" contenteditable="true" style="min-height: 60px;">
      【简要病情】患者因"主诉"入院。描述患者的主要症状、体征及辅助检查结果。
    </div>
  </div>

  <p style="margin: 10px 0 10px 0;"><b>术前诊断：</b><span class="new-textbox" data-hm-name="术前诊断" style="flex: 1;"><span class="new-textbox-content" contenteditable="true">1. </span></span></p>

  <p style="margin: 10px 0 10px 0;"><b>手术指征：</b><span class="new-textbox" data-hm-name="手术指征" style="flex: 1;"><span class="new-textbox-content" contenteditable="true"></span></span></p>

  <p style="margin: 10px 0 10px 0;"><b>拟行手术名称：</b><span class="new-textbox" data-hm-name="拟行手术名称" style="flex: 1;"><span class="new-textbox-content" contenteditable="true"></span></span></p>

  <p style="margin: 10px 0 10px 0; display: flex; align-items: center;">
    <b style="white-space: nowrap;">拟行麻醉方式：</b>
    <span class="new-textbox" style="flex: 1;" data-hm-name="拟行麻醉方式"><span class="new-textbox-content" contenteditable="true"></span></span>
  </p>

  <p style="margin: 10px 0 10px 0;"><b>术前准备：</b></p>
  <div class="new-textbox" data-hm-name="术前准备" style="text-indent: 2em; margin-bottom: 10px;">
    <div class="new-textbox-content" contenteditable="true" style="min-height: 40px;">
      记录术前的各项准备工作，如禁食、备皮、配血、药物过敏试验等。
    </div>
  </div>

  <p style="margin: 10px 0 10px 0;"><b>手术要点：</b></p>
  <div class="new-textbox" data-hm-name="手术要点" style="text-indent: 2em; margin-bottom: 10px;">
    <div class="new-textbox-content" contenteditable="true" style="min-height: 40px;">
      记录手术的关键步骤和注意事项。
    </div>
  </div>

  <p style="margin: 10px 0 10px 0;"><b>注意事项：</b></p>
  <div class="new-textbox" data-hm-name="注意事项" style="text-indent: 2em; margin-bottom: 10px;">
    <div class="new-textbox-content" contenteditable="true" style="min-height: 40px;">
      记录术后需要特别关注的事项。
    </div>
  </div>

  <p style="text-align: right; margin-top: 30px; margin-bottom: 0;">
    医师签名：<span class="new-textbox" data-hm-name="医师签名"><span class="new-textbox-content" contenteditable="true" style="min-width: 80px; display: inline-block; border-bottom: 1px solid #000;"></span></span>
  </p>
</div>
</body>
</html>
