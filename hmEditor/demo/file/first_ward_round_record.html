<body data-hm-papersize="A4_portrait$top:5mm#right:5mm#bottom:5mm#left:5mm" meta_json="" style="font-family: SimSun, 'Songti SC', serif; font-size: 16px; line-height: 1.8;">
<div class="emr-content-block" style="font-family: SimSun, 'Songti SC', serif; font-size: 16px; line-height: 1.8; color: #000;">
  <p style="margin-top: 0; margin-bottom: 5px; font-weight: bold;">
    <span class="new-textbox" data-hm-name="记录时间"><span class="new-textbox-content" contenteditable="true">YYYY-MM-DD HH:MM</span></span>

  <div class="new-textbox" data-hm-name="病程正文" style="text-indent: 2em; margin-bottom: 5px;">

  </div>

    医师签名：<span class="new-textbox" data-hm-name="医师签名"><span class="new-textbox-content" contenteditable="true" style="min-width: 80px; display: inline-block; border-bottom: 1px solid #000;"></span></span>

</div>
